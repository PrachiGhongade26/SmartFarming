<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Reset Password | FarmConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--soil:#3B2314;
--bark:#5C3A1E;
--wheat:#D4A843;
--sage:#5A7A4A;
--leaf:#3D6B35;
--cream:#FBF6EC;
--fog:#F0E8D6;
--text:#2A1A0E;
--muted:#7A6050;
--white:#FFFFFF;
--error:#C0392B;
--success:#27AE60;
--border:rgba(92,58,30,.15);

}

body{

font-family:'DM Sans',sans-serif;
background:var(--cream);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
position:relative;
overflow:hidden;

}

body::before{

content:'';

position:fixed;
inset:0;

background:

radial-gradient(
ellipse 60% 40%
at 10% 80%,
rgba(90,122,74,.10),
transparent 70%
),

radial-gradient(
ellipse 50% 50%
at 90% 10%,
rgba(212,168,67,.10),
transparent 70%
);

}

.container{

width:100%;
max-width:470px;
position:relative;
z-index:5;

}

.brand{

text-align:center;
margin-bottom:30px;

}

.brand-icon{

width:65px;
height:65px;
background:var(--sage);

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

margin:auto;

margin-bottom:15px;

box-shadow:0 5px 20px rgba(61,107,53,.25);

}

.brand-icon svg{

width:34px;
fill:white;

}

.brand h1{

font-family:'Playfair Display',serif;

font-size:32px;

color:var(--soil);

}

.brand p{

margin-top:6px;
font-size:14px;
color:var(--muted);

}

.card{

background:white;

padding:40px;

border-radius:22px;

border:1px solid var(--border);

box-shadow:

0 8px 35px rgba(59,35,20,.08);

}

.title{

font-family:'Playfair Display',serif;

font-size:28px;

margin-bottom:8px;

color:var(--soil);

}

.subtitle{

font-size:15px;

color:var(--muted);

line-height:1.7;

margin-bottom:30px;

}

.field{

margin-bottom:22px;

}

label{

display:block;

font-size:13px;

text-transform:uppercase;

margin-bottom:8px;

font-weight:600;

color:var(--bark);

}

.password-box{

position:relative;

}

.password-box input{

width:100%;

padding:15px;

padding-right:50px;

border-radius:10px;

border:1.5px solid var(--border);

background:var(--cream);

font-size:15px;

outline:none;

transition:.3s;

}

.password-box input:focus{

border-color:var(--sage);

background:white;

box-shadow:0 0 0 3px rgba(90,122,74,.12);

}

.toggle{

position:absolute;

right:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:20px;

user-select:none;

}

.strength{

height:5px;

background:#eee;

border-radius:20px;

margin-top:10px;

overflow:hidden;

}

.strength-fill{

height:100%;

width:0%;

transition:.3s;

}

.strength-text{

margin-top:6px;

font-size:13px;

color:var(--muted);

}

.error{

display:none;

font-size:13px;

margin-top:6px;

color:var(--error);

}

.alert{

display:none;

padding:14px;

border-radius:10px;

margin-bottom:20px;

font-size:14px;

line-height:1.6;

}

.alert.success{

display:block;

background:#EBF7F0;

border:1px solid #A8DCBC;

color:#1E7D48;

}

.alert.error{

display:block;

background:#FDEDEC;

border:1px solid #F5C6BF;

color:#C0392B;

}

.btn{

width:100%;

padding:15px;

background:var(--sage);

border:none;

border-radius:10px;

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.btn:hover{

background:var(--leaf);

}

.btn:disabled{

opacity:.6;

cursor:not-allowed;

}

.back{

display:flex;

justify-content:center;

margin-top:20px;

text-decoration:none;

color:var(--muted);

font-size:14px;

}

.back:hover{

color:var(--soil);

}

</style>

</head>

<body>

<div class="container">

<div class="brand">

<div class="brand-icon">

<svg viewBox="0 0 24 24">

<path d="M12 2C9 2 6 4 5 7c-1 2.5-.5 5 1 7 1 1.5 2 2.5 3 3v3h6v-3c1-.5 2-1.5 3-3 1.5-2 2-4.5 1-7-1-3-4-5-7-5z"/>

</svg>

</div>

<h1>FarmConnect</h1>

<p>Create a New Password</p>

</div>

<div class="card">

<h2 class="title">

Reset Password

</h2>

<p class="subtitle">

Choose a strong password for your FarmConnect account.

</p>

<div id="alert"
class="alert">

</div>

<div class="field">

<label>

New Password

</label>

<div class="password-box">

<input

type="password"

id="password"

placeholder="Minimum 8 characters">

<span

class="toggle"

onclick="togglePassword('password',this)">

👁

</span>

</div>

<div class="strength">

<div

class="strength-fill"

id="strengthFill">

</div>

</div>

<div

class="strength-text"

id="strengthText">

</div>

<div

class="error"

id="passwordError">

Password must be at least 8 characters.

</div>

</div>

<div class="field">

<label>

Confirm Password

</label>

<div class="password-box">

<input

type="password"

id="confirmPassword"

placeholder="Re-enter your password">

<span

class="toggle"

onclick="togglePassword('confirmPassword',this)">

👁

</span>

</div>

<div

class="error"

id="confirmError">

Passwords do not match.

</div>

</div>

<button

class="btn"

id="resetBtn"

onclick="resetPassword()">

Reset Password

</button>

<a
href="../SFA Login/login.html"

class="back">

← Back to Login

</a>

</div>

</div>

<script type="module">

import { auth } from "../firebase.js";

import {

confirmPasswordReset,

verifyPasswordResetCode

}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const params=new URLSearchParams(window.location.search);

const oobCode=params.get("oobCode");

const password=document.getElementById("password");

const confirmPassword=document.getElementById("confirmPassword");

const strengthFill=document.getElementById("strengthFill");

const strengthText=document.getElementById("strengthText");

const alertBox=document.getElementById("alert");

const btn=document.getElementById("resetBtn");

const passwordError=document.getElementById("passwordError");

const confirmError=document.getElementById("confirmError");

try{

await verifyPasswordResetCode(auth,oobCode);

}

catch(error){

alertBox.className="alert error";

alertBox.innerHTML="❌ This password reset link is invalid or has expired.";

btn.disabled=true;

}

function togglePassword(id,icon){

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.innerHTML="🙈";

}

else{

input.type="password";

icon.innerHTML="👁";

}

}

password.addEventListener("input",checkStrength);

function checkStrength(){

const value=password.value;

let score=0;

if(value.length>=8) score++;

if(/[A-Z]/.test(value)) score++;

if(/[0-9]/.test(value)) score++;

if(/[^A-Za-z0-9]/.test(value)) score++;

const colors=[

"transparent",

"#E74C3C",

"#F39C12",

"#F1C40F",

"#27AE60"

];

const labels=[

"",

"Weak",

"Fair",

"Good",

"Strong"

];

strengthFill.style.width=(score*25)+"%";

strengthFill.style.background=colors[score];

strengthText.innerHTML=labels[score];

strengthText.style.color=colors[score];

}

async function resetPassword(){

passwordError.style.display="none";

confirmError.style.display="none";

alertBox.className="alert";

if(password.value.length<8){

passwordError.style.display="block";

return;

}

if(password.value!==confirmPassword.value){

confirmError.style.display="block";

return;

}

btn.disabled=true;

btn.innerHTML="Updating Password...";

try{

await confirmPasswordReset(

auth,

oobCode,

password.value

);

alertBox.className="alert success";

alertBox.innerHTML="✅ Password updated successfully! Redirecting to login...";

setTimeout(()=>{

window.location.href="login.html";

},2500);

}

catch(error){

alertBox.className="alert error";

switch(error.code){

case "auth/expired-action-code":

alertBox.innerHTML="❌ This password reset link has expired.";

break;

case "auth/invalid-action-code":

alertBox.innerHTML="❌ Invalid password reset link.";

break;

case "auth/weak-password":

alertBox.innerHTML="❌ Please choose a stronger password.";

break;

default:

alertBox.innerHTML="❌ "+error.message;

}

btn.disabled=false;

btn.innerHTML="Reset Password";

}

}

</script>

</body>

</html>
